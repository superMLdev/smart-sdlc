name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"   # triggers on version tags like v1.5.2, v2.0.0, etc.

  # Allow manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to publish (e.g. v1.5.2)"
        required: false

jobs:
  publish:
    name: Publish npm packages
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub Releases
      id-token: write   # required for npm trusted publishing (OIDC)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          scope: "@supermldev"

      - name: Verify package version matches tag
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ github.event.inputs.tag }}"
          fi
          echo "Package version: $PKG_VERSION"
          echo "Tag:             $TAG"
          if [ -n "$TAG" ] && [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG)"
            exit 1
          fi

      - name: Publish @supermldev/smart-sdlc
        run: |
          MAIN_VERSION="$(node -p "require('./package.json').version")"
          if npm view "@supermldev/smart-sdlc@${MAIN_VERSION}" version &>/dev/null; then
            echo "::notice::@supermldev/smart-sdlc@${MAIN_VERSION} already published — skipping."
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Sync alias package version
        run: |
          MAIN_VERSION="$(node -p "require('./package.json').version")"
          cd packages/smart-sdlc
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const v = '${MAIN_VERSION}';
            pkg.version = v;
            pkg.dependencies['@supermldev/smart-sdlc'] = '^' + v;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('Alias package.json updated to version ' + v);
          "

      - name: Publish smart-sdlc (alias)
        run: |
          MAIN_VERSION="$(node -p "require('./package.json').version")"
          cd packages/smart-sdlc
          ALIAS_VERSION="$(node -p "require('./package.json').version")"
          if npm view "smart-sdlc@${ALIAS_VERSION}" version &>/dev/null; then
            echo "::notice::smart-sdlc@${ALIAS_VERSION} already published — skipping."
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
